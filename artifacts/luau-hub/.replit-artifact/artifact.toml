kind = "web"
previewPath = "/"
title = "LuauHub"
version = "1.0.0"
id = "artifacts/luau-hub"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21367

[services.development]
run = "pnpm --filter @workspace/luau-hub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/luau-hub", "run", "build" ]
publicDir = "artifacts/luau-hub/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21367"
BASE_PATH = "/"
